;font-size:1rem}.btn:hover{transform:translateY(-3px);filter:brightness(1.06)}.secondary{background:#ffffff14;border:1px solid #f6c75b88;color:#ffe5a6;box-shadow:none}.stage{height:310px;border-radius:28px;background:radial-gradient(circle,#f6c75b55,transparent 34%),linear-gradient(#fff2,#071a3522);border:1px solid #fff3;position:relative;overflow:hidden}.stage:before{content:"";position:absolute;inset:26px;border-radius:50%;background:repeating-conic-gradient(#f6c75b 0 8deg,#b72b24 8deg 16deg,#153f73 16deg 24deg);mask:radial-gradient(circle,transparent 0 35%,#000 36% 51%,transparent 52%);animation:rot 28s linear infinite}.stage:after{content:"🥁";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:7rem;animation:float 3s ease-in-out infinite}.ribbon{position:absolute;left:0;right:0;bottom:0;height:54px;background:repeating-linear-gradient(45deg,#b72b24 0 28px,#f6c75b 28px 36px,#153f73 36px 64px,#2fa36b 64px 72px)}
.title{margin:44px 0 18px;display:flex;justify-content:space-between;gap:20px;align-items:end}.title h2{font-size:clamp(1.9rem,4vw,3rem);color:#ffe1a0}.title p{max-width:570px;color:#fff7e6c9;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{min-height:292px;display:flex;flex-direction:column;padding:20px;border-radius:26px;background:linear-gradient(145deg,#ffffff22,#ffffff0c),linear-gradient(135deg,#153f73ee,#071a35ee);border:1px solid #f6c75b66;box-shadow:0 18px 46px #0006;transition:.24s;position:relative;overflow:hidden}.card:hover{transform:translateY(-8px);border-color:#f6c75b}.card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 84% 16%,var(--glow),transparent 24%),linear-gradient(135deg,transparent 44%,#f6c75b33 45%,transparent 47%);background-size:auto,56px 56px;opacity:.35}.card>*{position:relative}.top{display:flex;justify-content:space-between;align-items:center}.no{width:48px;height:48px;display:grid;place-items:center;border-radius:15px;background:linear-gradient(135deg,#ffe6a7,#f6c75b);color:#071a35;font-weight:900}.icon{font-size:3rem}.card h3{margin-top:22px;color:#ffe1a0;font-size:1.42rem}.card p{margin-top:12px;color:#fff7e6c9;line-height:1.7;flex:1}.tag{display:inline-block;margin:16px 8px 16px 0;padding:6px 10px;border-radius:999px;background:#fff2;border:1px solid #fff2;font-size:.82rem}.panel{margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px}.box{border-radius:24px;padding:24px;background:#fff2;border:1px solid #f6c75b55;backdrop-filter:blur(10px)}.box h3{color:#ffe1a0;margin-bottom:12px}.box p,.box li{color:#fff7e6cc;line-height:1.9}.box ul{padding-left:20px}.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:16px;background:#030814bb;z-index:9}.modal.show{display:flex}.game{width:min(880px,100%);max-height:calc(100vh - 32px);overflow:auto;border-radius:26px;background:linear-gradient(#fff7e6,#e8f3ee);color:#14213d;border:4px solid #f6c75b;box-shadow:0 28px 80px #0009}.head{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;background:linear-gradient(135deg,#071a35,#153f73);color:#fff7e6;border-bottom:3px solid #f6c75b}.close{width:38px;height:38px;border:0;border-radius:50%;background:#fff2;color:white;font-size:1.2rem;cursor:pointer}.stats{display:flex;gap:10px;flex-wrap:wrap;padding:14px 18px 0}.stat{padding:8px 13px;border-radius:999px;background:white;color:#153f73;font-weight:900}.area{position:relative;margin:16px 18px 20px;min-height:390px;overflow:hidden;border-radius:22px;border:3px solid #153f73;background:linear-gradient(#8dcdd8,#a1d69f 54%,#2f794f)}.player{position:absolute;bottom:18px;left:50%;width:58px;height:58px;transform:translateX(-50%);display:grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,#ffe1a0,#c9582a);border:3px solid #7e2b1f;font-size:2rem;z-index:2}.fall{position:absolute;top:-48px;width:44px;height:44px;display:grid;place-items:center;border-radius:50%;font-size:1.75rem;animation:fall linear forwards}.collect{background:#fff7e6;border:2px solid #f6c75b}.bad{background:#50372b;border:2px solid #442317}.result{padding:0 18px 20px;text-align:center;color:#b72b24;font-weight:900;min-height:28px}.battle{min-height:390px;margin:16px 18px 20px;border-radius:22px;padding:24px;display:grid;place-items:center;text-align:center;color:#fff7e6;background:radial-gradient(circle,#f6c75b44,transparent 34%),linear-gradient(#23476f,#162846 52%,#4c1c1d)}.fighters{display:flex;align-items:center;justify-content:center;gap:18px;margin:20px 0}.fighter{flex:1;min-width:180px;padding:18px;border-radius:22px;background:#fff2;border:1px solid #f6c75b66}.avatar{font-size:4rem}.bar{height:16px;margin-top:12px;border-radius:999px;background:#0005;overflow:hidden}.hp{height:100%;width:100%;background:linear-gradient(90deg,#2fa36b,#8ee2a8)}.enemy{background:linear-gradient(90deg,#ef493f,#ffb05d)}.msg{min-height:30px;color:#ffe1a0;font-weight:900}.battle-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}@keyframes rot{to{transform:rotate(360deg)}}@keyframes float{50%{transform:translate(-50%,-56%) rotate(5deg)}}@keyframes fall{to{transform:translateY(500px) rotate(180deg)}}@media(max-width:920px){.hero,.grid,.panel{grid-template-columns:1fr}.hero{min-height:auto}}@media(max-width:640px){.page{width:calc(100% - 18px)}.hero{padding:22px 16px}.stage{height:230px}.title{flex-direction:column;align-items:flex-start}.fighters{flex-direction:column}}
</style></head><body><main class="page"><section class="hero"><div><div class="eyebrow">蓝靛瑶语文化 · 闯关学习</div><h1>瑶境<span>争锋</span></h1><p class="lead">云雾漫过山峦，长鼓声起，邀你踏入瑶山秘境。<br>在蓝靛纹样与银饰光影间，开启六段文化试炼，<br>于趣味闯关里，读懂蓝靛瑶的山海传说与烟火人间。</p><div class="actions"><a class="btn" href="#levels">开始闯关</a><a class="btn secondary" href="#culture">了解瑶族元素</a></div></div><div class="stage"><div class="ribbon"></div></div></section><section id="levels"><div class="title"><h2>六关试炼</h2><p>本地关卡可直接游玩，外部关卡将在新页面打开。</p></div><div class="grid" id="grid"></div></section><section id="culture" class="panel"><div class="box"><h3>设计灵感</h3><p>页面以蓝靛色为主调，搭配红、金、银、绿等瑶族服饰与节庆色彩，加入山脉剪影、织锦几何纹和长鼓舞台。</p></div><div class="box"><h3>闯关安排</h3><ul><li>第一关、第三关保留在首页内游玩。</li><li>第二关“瑶寨消消乐”。</li><li>第四关“瑶寨打糍粑”。</li><li>第五关“瑶乐指尖”。</li><li>第六关“瑶寨跑酷”。</li></ul></div></section></main><div id="modal" class="modal"><div class="game"><div class="head"><h3 id="gtitle">本地关卡</h3><button class="close" onclick="closeGame()">×</button></div><div id="stats" class="stats"></div><div id="content"></div><div id="result" class="result"></div></div></div><script>
const lv=[['01','🌲','第1关：长鼓森林','穿越瑶山森林，移动角色收集长鼓、银饰与蓝靛花，避开山石。','本地保留','openForest()'],['02','🧩','第2关：瑶寨消消乐','以瑶族纹样与寨中意象为主题的消除玩法，在匹配中认识传统符号。','外部关卡','https://idknowbb.github.io/landianyaoxiaoxiaole/'],['03','🥁','第3关：盘王祭坛','在祭坛鼓声中完成鼓舞对决，使用敲鼓、长鼓舞与银饰守护。','本地保留','openBattle()'],['04','🍡','第4关：瑶寨打糍粑','体验节庆打糍粑的协作与节奏，理解团圆、丰收与待客寓意。','外部关卡','https://idknowbb.github.io/jida/'],['05','🎵','第5关：瑶乐指尖','跟随旋律点击节拍，感受瑶族歌舞与长鼓节奏。','外部关卡','https://idknowbb.github.io/yaotapgame/'],['06','🏃','第6关：瑶寨跑酷','穿梭吊脚楼与山路之间，体验瑶寨地形和山地生活。','外部关卡','https://17787916797z-beep.github.io/run2/']];
grid.innerHTML=lv.map(x=>`<article class="card" style="--glow:${x[4]=='本地保留'?'#f6c75b88':'#2fa36b88'}"><div class="top"><div class="no">${x[0]}</div><div class="icon">${x[1]}</div></div><h3>${x[2]}</h3><p>${x[3]}</p><div><span class="tag">${x[4]}</span><span class="tag">瑶族文化</span></div>${x[5][0]=='h'?`<a class="btn" target="_blank" href="${x[5]}">打开关卡</a>`:`<button class="btn" onclick="${x[5]}">进入关卡</button>`}</article>`).join('');
let fs,ft,sp,bs,audio={bgm:null,click:null,win:null,fail:null};function initAudio(){audio.bgm=new Audio('assets/audio/bgm.mp3');audio.click=new Audio('assets/audio/click.mp3');audio.win=new Audio('assets/audio/win.mp3');audio.fail=new Audio('assets/audio/fail.mp3');audio.bgm.loop=true;audio.bgm.volume=0.3;audio.click.volume=0.5;audio.win.volume=0.6;audio.fail.volume=0.6}function playAudio(type){if(!audio[type])return;audio[type].currentTime=0;audio[type].play().catch(e=>console.log('音频播放失败:',e))}function stopBGM(){if(audio.bgm){audio.bgm.pause();audio.bgm.currentTime=0}}function show(t){gtitle.textContent=t;result.textContent='';modal.classList.add('show');if(!audio.bgm)initAudio()}function closeGame(){modal.classList.remove('show');clearInterval(ft);clearInterval(sp);if(bs&&bs.autoTimer)clearInterval(bs.autoTimer);stopBGM();fs=bs=null;stats.innerHTML=content.innerHTML=''}modal.onclick=e=>{if(e.target==modal)closeGame()};onkeydown=e=>{if(e.key=='Escape')closeGame();if(fs&&modal.classList.contains('show')){if(e.key=='ArrowLeft'||e.key.toLowerCase()=='a')move(-9);if(e.key=='ArrowRight'||e.key.toLowerCase()=='d')move(9)}};
function openForest(){show('第1关：长鼓森林');playAudio('bgm');fs={score:0,time:55,hp:100,x:50,end:0,combo:0,maxCombo:0,drum:0,silver:0,flower:0,shield:0};content.innerHTML='<div class="area" id="area"><div style="position:absolute;left:16px;top:14px;z-index:3;background:#071a35cc;color:#ffe1a0;padding:8px 12px;border-radius:14px;font-weight:900">任务：长鼓×3 银饰×2 蓝靛花×2</div><div class="player" id="player">🧑‍🌾</div></div><div class="actions" style="justify-content:center;padding:0 18px 20px"><button class="btn secondary" onclick="playAudio(\'click\');move(-12)">向左</button><button class="btn secondary" onclick="playAudio(\'click\');move(12)">向右</button><button class="btn secondary" onclick="playAudio(\'click\');dash(-1)">左闪避</button><button class="btn secondary" onclick="playAudio(\'click\');dash(1)">右闪避</button><button class="btn" onclick="playAudio(\'click\');openForest()">重新开始</button></div>';updF();clearInterval(ft);clearInterval(sp);ft=setInterval(()=>{if(!fs||fs.end)return;fs.time--;if(fs.combo>0&&fs.time%4==0)fs.combo=Math.max(0,fs.combo-1);updF();if(fs.time<=0)endF(fs.score>=100&&taskDone())},1000);sp=setInterval(spawn,560)}
function taskDone(){return fs.drum>=3&&fs.silver>=2&&fs.flower>=2}function updF(){stats.innerHTML=`<div class="stat">得分：${fs.score}</div><div class="stat">时间：${fs.time}s</div><div class="stat">生命：${fs.hp}</div><div class="stat">连击：${fs.combo}</div><div class="stat">护盾：${fs.shield}</div><div class="stat">任务：🥁${fs.drum}/3 💎${fs.silver}/2 🌸${fs.flower}/2</div>`}function move(d){if(!fs||fs.end)return;fs.x=Math.max(5,Math.min(95,fs.x+d));player.style.left=fs.x+'%'}function dash(dir){if(!fs||fs.end)return;move(dir*22);result.textContent='你踏出瑶山闪避步，快速避开危险区域。'}
function spawn(){if(!fs||fs.end)return;let level=fs.score>80?.18:0,b=Math.random()<.32+level,it=document.createElement('div'),rare=Math.random();it.className='fall '+(b?'bad':'collect');let data;if(b){data=Math.random()<.28?['🔥',28,'祭火会破坏护盾与生命']:[['🪨','🌵'][Math.random()*2|0],18,'撞到山路障碍，生命降低。']}else{let pool=[['🥁',12,'drum','长鼓能量让鼓声更响。'],['💎',16,'silver','银饰闪光，获得护盾。'],['🌸',14,'flower','蓝靛花染亮了山路。'],['🍃',10,'leaf','瑶山草药恢复生命。']];data=rare>.9?['⏳',0,'time','盘王祝福，时间增加5秒。']:pool[Math.random()*pool.length|0]}it.textContent=data[0];it.style.left=Math.random()*88+4+'%';it.style.animationDuration=Math.max(1.6,2.9+Math.random()*1.3-fs.score/160)+'s';area.appendChild(it);let ck=setInterval(()=>{if(!fs||fs.end||!it.isConnected){clearInterval(ck);return}let r=it.getBoundingClientRect(),pr=player.getBoundingClientRect();if(r.left<pr.right&&r.right>pr.left&&r.top<pr.bottom&&r.bottom>pr.top){if(b){if(fs.shield>0){fs.shield--;playAudio('click');result.textContent='银饰护盾挡下了危险。'}else{fs.hp-=data[1];fs.combo=0;playAudio('fail');result.textContent=data[2]}}else{fs.combo++;fs.maxCombo=Math.max(fs.maxCombo,fs.combo);let add=data[1]+Math.min(20,fs.combo*2);fs.score+=add;playAudio('click');if(data[2]=='drum')fs.drum++;if(data[2]=='silver'){fs.silver++;fs.shield=Math.min(3,fs.shield+1)}if(data[2]=='flower')fs.flower++;if(data[2]=='leaf')fs.hp=Math.min(100,fs.hp+12);if(data[2]=='time')fs.time+=5;result.textContent=`${data[3]} 连击加成 +${add} 分。`}it.remove();clearInterval(ck);updF();if(fs.hp<=0)endF(false);if(fs.score>=150&&taskDone())endF(true)}},55);it.onanimationend=()=>{it.remove();clearInterval(ck)}}function endF(w){fs.end=1;clearInterval(ft);clearInterval(sp);stopBGM();if(w){playAudio('win');result.textContent=`恭喜通过第1关！最高连击 ${fs.maxCombo}，你完成了长鼓、银饰与蓝靛花收集任务。`}else{playAudio('fail');result.textContent='挑战结束。目标是100分并完成三项收集任务，再试一次吧。'}}
function openBattle(){show('第3关：盘王祭坛');playAudio('bgm');bs={ph:110,eh:120,g:0,end:0,round:1,rage:0,weak:0,cool:{heal:0,guard:0,dance:0},intent:'鼓击',autoTimer:null};content.innerHTML='<div class="battle"><div><h2>盘王鼓台对决</h2><p style="margin:10px 0;color:#fff7e6cc;line-height:1.7">守护灵会自动攻击。敲鼓蓄怒无冷却，长鼓舞2回合冷却，银饰守护2回合冷却，瑶药调息3回合冷却。怒气满可释放盘王鼓震。</p><div class="fighters"><div class="fighter"><div class="avatar">🧑‍🌾</div><h3>传承者</h3><div class="bar"><div id="ph" class="hp"></div></div></div><strong style="font-size:2rem;color:#ffe1a0">VS</strong><div class="fighter"><div class="avatar">🥁</div><h3>鼓台守护灵</h3><div class="bar"><div id="eh" class="hp enemy"></div></div></div></div><div class="battle-actions"><button class="btn" id="btnDrum" onclick="playAudio(\'click\');act(\'drum\')">敲响长鼓</button><button class="btn" id="btnDance" onclick="playAudio(\'click\');act(\'dance\')">长鼓舞步</button><button class="btn secondary" id="btnGuard" onclick="playAudio(\'click\');act(\'guard\')">银饰守护</button><button class="btn secondary" id="btnHeal" onclick="playAudio(\'click\');act(\'heal\')">瑶药调息</button><button class="btn" id="btnRage" onclick="playAudio(\'click\');act(\'rage\')">盘王鼓震</button><button class="btn secondary" onclick="playAudio(\'click\');openBattle()">重新开始</button></div><div id="msg" class="msg">守护灵正在观察你，准备发动攻击。</div></div></div>';nextIntent();updB();startAutoAttack()}
function startAutoAttack(){clearInterval(bs.autoTimer);bs.autoTimer=setInterval(()=>{if(!bs||bs.end)return;enemyAutoTurn()},3200)}
function updB(){stats.innerHTML=`<div class="stat">回合：${bs.round}</div><div class="stat">生命：${bs.ph}/110</div><div class="stat">守护灵：${bs.eh}/120</div><div class="stat">怒气：${bs.rage}/100</div><div class="stat">敌方意图：${bs.intent}</div>`;ph.style.width=Math.max(0,bs.ph/110*100)+'%';eh.style.width=Math.max(0,bs.eh/120*100)+'%';updateBtnStates()}
function updateBtnStates(){let bd=document.getElementById('btnDance'),bg=document.getElementById('btnGuard'),bh=document.getElementById('btnHeal'),br=document.getElementById('btnRage');if(bd){bd.disabled=bs.cool.dance>0;bd.textContent=bs.cool.dance>0?`长鼓舞步(${bs.cool.dance})`:'长鼓舞步'}if(bg){bg.disabled=bs.cool.guard>0;bg.textContent=bs.cool.guard>0?`银饰守护(${bs.cool.guard})`:'银饰守护'}if(bh){bh.disabled=bs.cool.heal>0;bh.textContent=bs.cool.heal>0?`瑶药调息(${bs.cool.heal})`:'瑶药调息'}if(br){br.disabled=bs.rage<100;br.textContent=bs.rage<100?`盘王鼓震(${bs.rage}/100)`:'盘王鼓震'}}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}function nextIntent(){bs.intent=['鼓击','重踏','祭火','凝神'][Math.random()*4|0]}
function act(t){if(!bs||bs.end)return;let txt='',d=0;if(t=='rage'&&bs.rage<100){msg.textContent='怒气未满，暂时无法释放盘王鼓震。';return}if(t=='heal'&&bs.cool.heal>0){msg.textContent='瑶药还在调息中，请等待冷却。';return}if(t=='dance'&&bs.cool.dance>0){msg.textContent='长鼓舞步还在恢复中。';return}if(t=='guard'&&bs.cool.guard>0){msg.textContent='银饰守护还在冷却中。';return}if(t=='drum'){d=rnd(15,22);bs.rage+=26;txt=`你稳稳敲响长鼓，造成 ${d} 点伤害并积蓄怒气。`}if(t=='dance'){d=rnd(26,36);bs.rage+=18;bs.weak=1;bs.cool.dance=2;txt=`你踏出长鼓舞步，造成 ${d} 点伤害，并让守护灵短暂破防。`}if(t=='guard'){bs.g=1;bs.rage+=14;bs.cool.guard=2;txt='银饰护身，下一次伤害大幅降低，并积蓄少量怒气。'}if(t=='heal'){let h=rnd(20,28);bs.ph=Math.min(110,bs.ph+h);bs.cool.heal=3;bs.rage+=10;txt=`你饮下瑶药调息，恢复 ${h} 点生命。`}if(t=='rage'){d=rnd(45,58);bs.rage=0;bs.weak=1;txt=`盘王鼓震响彻祭坛，造成 ${d} 点巨额伤害！`}if(bs.weak&&d>0){d+=10;txt+=' 破防追加10点。';bs.weak=0}bs.eh-=d;bs.rage=Math.min(100,bs.rage);msg.textContent=txt;if(bs.eh<=0){bs.eh=0;finish(1,txt);return}updB()}
function enemyAutoTurn(){if(!bs||bs.end)return;let txt='',d=0;if(bs.intent=='鼓击')d=rnd(10,16);if(bs.intent=='重踏')d=rnd(16,23);if(bs.intent=='祭火'){d=rnd(12,19);bs.rage=Math.max(0,bs.rage-12);txt='守护灵祭火压制了12点怒气，'}if(bs.intent=='凝神'){bs.eh=Math.min(120,bs.eh+12);txt='守护灵凝神恢复12点生命，'}if(d>0){if(bs.g){d=Math.ceil(d*.3);bs.g=0;txt+=`银饰守护生效，你仅受到 ${d} 点伤害。`}else{txt+=`守护灵发动${bs.intent}，你受到 ${d} 点伤害。`;playAudio('fail')}bs.ph-=d}bs.round++;if(bs.cool.heal>0)bs.cool.heal--;if(bs.cool.guard>0)bs.cool.guard--;if(bs.cool.dance>0)bs.cool.dance--;nextIntent();msg.textContent=txt;if(bs.ph<=0){bs.ph=0;finish(0,txt);return}updB()}
function finish(w,txt){bs.end=1;clearInterval(bs.autoTimer);stopBGM();if(w){playAudio('win');msg.textContent=txt+' 你通过了盘王祭坛试炼，掌握了鼓、舞、守、养的传承节奏。';result.textContent='第3关通关成功！'}else{playAudio('fail');msg.textContent=txt+' 试炼暂未通过，观察意图并合理安排守护与调息。';result.textContent='第3关挑战失败。'}updB()}
</script></body></html>
